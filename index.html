<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rosenhöfe – ER Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{
    --bg:#0f1115; --card:#181b22; --card2:#1f232c; --line:#2a2f3a;
    --txt:#e7eaf0; --muted:#9aa3b2; --accent:#5b8cff; --green:#3ec98a; --red:#ff6b6b; --amber:#f5b14c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);padding:28px 32px;}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  h1{font-size:22px;margin:0;font-weight:650}
  h1 span{color:var(--muted);font-weight:400}
  .sync{font-size:13px;color:var(--muted)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .kpi .label{font-size:13px;color:var(--muted);margin-bottom:8px}
  .kpi .value{font-size:26px;font-weight:680;letter-spacing:-.3px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:6px}
  .grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:22px}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .card h2{font-size:14px;margin:0 0 14px;font-weight:600;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:14px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600}
  .pill.paid{background:rgba(62,201,138,.15);color:var(--green)}
  .pill.open{background:rgba(245,177,76,.15);color:var(--amber)}
  .err{background:rgba(255,107,107,.12);border:1px solid var(--red);color:#ffd5d5;padding:14px 18px;border-radius:12px}
  .muted{color:var(--muted)}
  canvas{max-height:300px}
</style>
</head>
<body>
<header>
  <h1>Rosenhöfe <span>· Eingangsrechnungen 2026</span></h1>
  <div class="sync" id="sync">Lade…</div>
</header>

<div id="error" style="display:none" class="err"></div>

<section class="kpis" id="kpis"></section>

<div class="grid">
  <div class="card"><h2>Netto nach Kostentreiber</h2><canvas id="chartTreiber"></canvas></div>
  <div class="card"><h2>Bezahlt vs. offen (Brutto)</h2><canvas id="chartStatus"></canvas></div>
</div>

<div class="card" style="margin-bottom:22px"><h2>Netto-Verlauf nach Monat</h2><canvas id="chartMonat"></canvas></div>

<div class="card">
  <h2>Alle Rechnungen <span class="muted" id="rowcount"></span></h2>
  <div class="tablewrap">
    <table id="tbl">
      <thead><tr>
        <th data-k="rechnungsdatum">Datum</th>
        <th data-k="lieferant">Lieferant</th>
        <th data-k="rechnungs_nr">Re.-Nr.</th>
        <th data-k="kostentreiber">Kostentreiber</th>
        <th class="num" data-k="brutto">Brutto</th>
        <th class="num" data-k="netto">Netto</th>
        <th data-k="faellig">Fällig</th>
        <th data-k="bezahlt">Status</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
// ====================================================================
//  KONFIGURATION – hier deine Supabase-Werte eintragen.
//  Der anon-Key ist öffentlich unbedenklich (RLS erlaubt nur Lesen).
// ====================================================================
const SUPABASE_URL  = "https://tyjtdqmtykbylqfffdpy.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5anRkcW10eWtieWxxZmZmZHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODg0MzUsImV4cCI6MjA5NjY2NDQzNX0.WTxofeYRN4em5wriD5YSP9uF2UqKzKg7lb97L9pAhjc";
// ====================================================================

const eur = n => (n||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'});
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
let rows = [], sortKey='rechnungsdatum', sortAsc=false;

function showError(msg){
  const e=document.getElementById('error');
  e.style.display='block';
  e.textContent='Fehler beim Laden: '+msg+'  (Sind SUPABASE_URL / SUPABASE_ANON eingetragen?)';
}

async function load(){
  if(SUPABASE_URL.includes('DEINPROJEKT')){ showError('Konfiguration fehlt.'); return; }
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data, error } = await sb.from('er_rosenhoefe').select('*');
  if(error){ showError(error.message); return; }
  rows = data || [];

  const { data: meta } = await sb.from('sync_meta').select('*').eq('id',1).maybeSingle();
  if(meta && meta.last_sync){
    document.getElementById('sync').textContent =
      'Letzter Sync: '+ new Date(meta.last_sync).toLocaleString('de-DE') + ' · '+ rows.length +' Rechnungen';
  } else {
    document.getElementById('sync').textContent = rows.length+' Rechnungen';
  }
  render();
}

function render(){
  const brutto = rows.reduce((s,r)=>s+(+r.brutto||0),0);
  const netto  = rows.reduce((s,r)=>s+(+r.netto||0),0);
  const offen  = rows.filter(r=>!r.bezahlt);
  const offenB = offen.reduce((s,r)=>s+(+r.brutto||0),0);
  const bezahltB = brutto - offenB;

  document.getElementById('kpis').innerHTML = `
    ${kpi('Rechnungen', rows.length, '')}
    ${kpi('Brutto gesamt', eur(brutto), 'inkl. MwSt')}
    ${kpi('Netto gesamt', eur(netto), 'Lohn = brutto, sonst ÷1,19')}
    ${kpi('Offen', eur(offenB), offen.length+' unbezahlte Rechnungen')}
  `;

  // Netto nach Kostentreiber
  const byT={}; rows.forEach(r=>{const k=r.kostentreiber||'—';byT[k]=(byT[k]||0)+(+r.netto||0)});
  const tEntries=Object.entries(byT).sort((a,b)=>b[1]-a[1]);
  bar('chartTreiber', tEntries.map(e=>e[0]), tEntries.map(e=>e[1]));

  // bezahlt vs offen (Balken – verträgt Gutschriften/negative Beträge)
  barColored('chartStatus',
    ['Bezahlt ('+(rows.length-offen.length)+')', 'Offen ('+offen.length+')'],
    [bezahltB, offenB], ['#3ec98a','#f5b14c']);

  // Netto nach Monat
  const byM=new Array(12).fill(0);
  rows.forEach(r=>{ if(r.rechnungsdatum){ const m=new Date(r.rechnungsdatum).getMonth(); byM[m]+=(+r.netto||0);} });
  line('chartMonat', MONTHS, byM);

  renderTable();
}

function kpi(label,value,sub){
  return `<div class="kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div>`;
}

function renderTable(){
  const tb=document.querySelector('#tbl tbody');
  const sorted=[...rows].sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==='brutto'||sortKey==='netto'){x=+x||0;y=+y||0;}
    else {x=(x??'').toString();y=(y??'').toString();}
    return (x<y?-1:x>y?1:0)*(sortAsc?1:-1);
  });
  tb.innerHTML = sorted.map(r=>`
    <tr>
      <td>${fmtDate(r.rechnungsdatum)}</td>
      <td>${r.lieferant||''}</td>
      <td>${r.rechnungs_nr||''}</td>
      <td>${r.kostentreiber||''}</td>
      <td class="num">${eur(+r.brutto)}</td>
      <td class="num">${eur(+r.netto)}</td>
      <td>${fmtDate(r.faellig)}</td>
      <td>${r.bezahlt?'<span class="pill paid">bezahlt</span>':'<span class="pill open">offen</span>'}</td>
    </tr>`).join('');
  document.getElementById('rowcount').textContent = '· '+rows.length;
}
function fmtDate(d){ return d ? new Date(d).toLocaleDateString('de-DE') : ''; }

document.querySelectorAll('#tbl th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(sortKey===k) sortAsc=!sortAsc; else {sortKey=k;sortAsc=true;}
  renderTable();
}));

// ---- Chart-Helfer ----
const GRID='#2a2f3a', TICK='#9aa3b2';
let charts={};
function destroy(id){ if(charts[id]) charts[id].destroy(); }
function bar(id,labels,data){
  destroy(id);
  charts[id]=new Chart(document.getElementById(id),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:'#5b8cff',borderRadius:6}]},
    options:baseOpts(true)});
}
function line(id,labels,data){
  destroy(id);
  charts[id]=new Chart(document.getElementById(id),{type:'line',
    data:{labels,datasets:[{data,borderColor:'#5b8cff',backgroundColor:'rgba(91,140,255,.15)',fill:true,tension:.3,pointRadius:3}]},
    options:baseOpts(true)});
}
function barColored(id,labels,data,colors){
  destroy(id);
  charts[id]=new Chart(document.getElementById(id),{type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6}]},
    options:baseOpts(true)});
}
function baseOpts(money){
  return {plugins:{legend:{display:false}},
    scales:{x:{ticks:{color:TICK},grid:{color:GRID}},
            y:{ticks:{color:TICK,callback:v=>money?eur(v):v},grid:{color:GRID}}}};
}

load();
</script>
</body>
</html>

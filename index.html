<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rosenhöfe – ER Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --line:#e4e7eb;
    --txt:#1d2733; --muted:#6b7686; --accent:#2f6bed; --accent-soft:#dbe6fd;
    --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt);padding:24px 28px;}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:14px}
  #logo{height:42px;width:auto;display:block}
  h1{font-size:21px;margin:0;font-weight:650}
  h1 span{color:var(--muted);font-weight:400}
  .sync{font-size:13px;color:var(--muted)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
  .kpi .label{font-size:13px;color:var(--muted);margin-bottom:8px}
  .kpi .value{font-size:27px;font-weight:680;letter-spacing:-.3px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:6px;min-height:1px}
  .charts2{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:22px}
  @media(max-width:900px){.charts2{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:22px}
  .card h2{font-size:14px;margin:0 0 14px;font-weight:600;color:var(--muted)}
  .hint{font-size:12px;color:var(--muted);font-weight:400}
  canvas{max-height:300px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:12px}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .dd{position:relative}
  .ddbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:14px;cursor:pointer;color:var(--txt)}
  .dd.open .ddbtn{border-color:var(--accent)}
  .badge{background:var(--accent);color:#fff;border-radius:999px;font-size:11px;padding:0 7px;line-height:18px;display:none}
  .ddmenu{display:none;position:absolute;z-index:20;top:calc(100% + 4px);left:0;min-width:250px;max-height:320px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(20,30,50,.12);padding:8px}
  .dd.open .ddmenu{display:block}
  .ddsearch{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px;font-size:13px}
  .ddrow{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;cursor:pointer;font-size:13px}
  .ddrow:hover{background:#f4f6fa}
  .amt{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
  .amt input{width:78px;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--txt)}
  .amt input:focus{outline:none;border-color:var(--accent)}
  .clearbtn{font-size:13px;color:var(--accent);cursor:pointer;font-weight:600;border:1px solid var(--line);background:#fff;padding:9px 12px;border-radius:9px}
  .clearbtn:hover{border-color:var(--accent)}
  .summary{font-size:13px;color:var(--muted);margin:0 0 14px}
  .summary b{color:var(--txt)}
  .err{background:#fdecec;border:1px solid #f3b4b4;color:#922;padding:14px 18px;border-radius:12px}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img id="logo" src="logo.png" alt="" onerror="this.style.display='none'" />
    <h1>Rosenhöfe <span>· Eingangsrechnungen 2026</span></h1>
  </div>
  <div class="sync" id="sync">Lade…</div>
</header>

<div id="error" style="display:none" class="err"></div>

<section class="kpis" id="kpis"></section>

<div class="charts2">
  <div class="card">
    <h2>Netto nach Kostentreiber <span class="hint">– Balken anklicken filtert die Tabelle</span></h2>
    <canvas id="chartTreiber"></canvas>
  </div>
  <div class="card">
    <h2>Netto-Verlauf nach Monat <span class="hint">– Balken anklicken filtert die Tabelle</span></h2>
    <canvas id="chartMonat"></canvas>
  </div>
</div>

<div class="card">
  <h2>Alle Rechnungen</h2>
  <div class="toolbar">
    <div class="dd" id="ddDatum"></div>
    <div class="dd" id="ddLieferant"></div>
    <div class="dd" id="ddKostentreiber"></div>
    <span class="amt">Brutto <input id="bMin" type="text" inputmode="decimal" placeholder="von"> <input id="bMax" type="text" inputmode="decimal" placeholder="bis"></span>
    <span class="amt">Netto <input id="nMin" type="text" inputmode="decimal" placeholder="von"> <input id="nMax" type="text" inputmode="decimal" placeholder="bis"></span>
    <button class="clearbtn" id="clearBtn">Alle Filter zurücksetzen</button>
  </div>
  <div class="summary" id="summary"></div>
  <div class="tablewrap">
    <table id="tbl">
      <thead><tr>
        <th data-k="rechnungsdatum">Datum</th>
        <th data-k="lieferant">Lieferant</th>
        <th data-k="kostentreiber">Kostentreiber</th>
        <th class="num" data-k="brutto">Brutto</th>
        <th class="num" data-k="netto">Netto</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
// ====================================================================
//  Supabase-Zugang (anon-Key – nur Lesen, öffentlich unbedenklich)
// ====================================================================
const SUPABASE_URL  = "https://tyjtdqmtykbylqfffdpy.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5anRkcW10eWtieWxxZmZmZHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODg0MzUsImV4cCI6MjA5NjY2NDQzNX0.WTxofeYRN4em5wriD5YSP9uF2UqKzKg7lb97L9pAhjc";
// ====================================================================

const eur = n => (n||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'});
const eurShort = n => Math.round(n||0).toLocaleString('de-DE')+' €';
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

const charts={};
let rows=[], sortKey='rechnungsdatum', sortAsc=false;
const fDatum=new Set(), fLieferant=new Set(), fTreiber=new Set(), fMonat=new Set();
let bMin=null,bMax=null,nMin=null,nMax=null;
let treiberByIndex=[];
let ddDatum=null, ddLief=null, ddTre=null;

function showError(msg){
  const e=document.getElementById('error'); e.style.display='block';
  e.textContent='Fehler beim Laden: '+msg;
}
function fmtDate(d){ return d ? new Date(d).toLocaleDateString('de-DE') : ''; }
function monthIdx(r){ return r.rechnungsdatum ? new Date(r.rechnungsdatum).getMonth() : -1; }
function barColor(set,key){ if(!set.size) return '#4f83f1'; return set.has(key)?'#2f6bed':'#cdd8ee'; }
function num(v){ v=(v||'').toString().replace(/\./g,'').replace(',','.').trim(); if(v==='') return null; const n=parseFloat(v); return isNaN(n)?null:n; }

// Summen über den Balken (überspringt 0-Werte)
const valueLabels={ id:'valueLabels', afterDatasetsDraw(chart){
  const {ctx}=chart;
  chart.getDatasetMeta(0).data.forEach((bar,i)=>{
    const v=chart.data.datasets[0].data[i];
    if(!v) return;
    ctx.save();
    ctx.fillStyle='#1d2733'; ctx.font='600 10px -apple-system,Segoe UI,Roboto,sans-serif'; ctx.textAlign='center';
    ctx.fillText(eurShort(v), bar.x, bar.y-7);
    ctx.restore();
  });
}};

async function load(){
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data, error } = await sb.from('er_rosenhoefe').select('*');
  if(error){ showError(error.message); return; }
  rows = data || [];
  const { data: meta } = await sb.from('sync_meta').select('*').eq('id',1).maybeSingle();
  document.getElementById('sync').textContent = (meta && meta.last_sync)
    ? 'Letzter Sync: '+ new Date(meta.last_sync).toLocaleString('de-DE') + ' · '+ rows.length +' Rechnungen'
    : rows.length+' Rechnungen';

  renderKpis();
  renderTreiber();
  renderMonat();
  buildFilters();
  renderTable();
}

function renderKpis(){
  const brutto = rows.reduce((s,r)=>s+(+r.brutto||0),0);
  const netto  = rows.reduce((s,r)=>s+(+r.netto||0),0);
  document.getElementById('kpis').innerHTML =
    kpi('Rechnungen', rows.length, '') +
    kpi('Brutto gesamt', eur(brutto), 'inkl. MwSt') +
    kpi('Netto gesamt', eur(netto), '');
}
function kpi(label,value,sub){
  return `<div class="kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div>`;
}

// ---- Balken: Netto nach Kostentreiber (klickbar) ----
function renderTreiber(){
  const byT={}; rows.forEach(r=>{const k=r.kostentreiber||'—';byT[k]=(byT[k]||0)+(+r.netto||0)});
  const ent=Object.entries(byT).sort((a,b)=>b[1]-a[1]);
  treiberByIndex=ent.map(e=>e[0]);
  if(charts.t) charts.t.destroy();
  charts.t=new Chart(document.getElementById('chartTreiber'),{
    type:'bar',
    data:{labels:treiberByIndex,datasets:[{data:ent.map(e=>e[1]),backgroundColor:treiberByIndex.map(t=>barColor(fTreiber,t)),borderRadius:6}]},
    options:{
      layout:{padding:{top:22}},
      onClick:(e,els)=>{ if(els.length) toggleTreiber(treiberByIndex[els[0].index]); },
      onHover:(e,els)=>{ e.native.target.style.cursor=els.length?'pointer':'default'; },
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#6b7686'},grid:{display:false}},
              y:{ticks:{color:'#6b7686',callback:v=>eurShort(v)},grid:{color:'#eef0f3'}}}
    },
    plugins:[valueLabels]
  });
}
function updateTreiberColors(){
  if(!charts.t) return;
  charts.t.data.datasets[0].backgroundColor=treiberByIndex.map(t=>barColor(fTreiber,t));
  charts.t.update();
}
function toggleTreiber(t){
  if(fTreiber.has(t)) fTreiber.delete(t); else fTreiber.add(t);
  if(ddTre) ddTre.refresh();
  afterFilterChange();
}

// ---- Balken: Netto nach Monat (klickbar) ----
function renderMonat(){
  const byM=new Array(12).fill(0);
  rows.forEach(r=>{ const m=monthIdx(r); if(m>=0) byM[m]+=(+r.netto||0); });
  if(charts.m) charts.m.destroy();
  charts.m=new Chart(document.getElementById('chartMonat'),{
    type:'bar',
    data:{labels:MONTHS,datasets:[{data:byM,backgroundColor:MONTHS.map((_,m)=>barColor(fMonat,String(m))),borderRadius:6}]},
    options:{
      layout:{padding:{top:22}},
      onClick:(e,els)=>{ if(els.length) toggleMonat(String(els[0].index)); },
      onHover:(e,els)=>{ e.native.target.style.cursor=els.length?'pointer':'default'; },
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#6b7686'},grid:{display:false}},
              y:{ticks:{color:'#6b7686',callback:v=>eurShort(v)},grid:{color:'#eef0f3'}}}
    },
    plugins:[valueLabels]
  });
}
function updateMonatColors(){
  if(!charts.m) return;
  charts.m.data.datasets[0].backgroundColor=MONTHS.map((_,m)=>barColor(fMonat,String(m)));
  charts.m.update();
}
function toggleMonat(m){
  if(fMonat.has(m)) fMonat.delete(m); else fMonat.add(m);
  afterFilterChange();
}

// ---- Spaltenfilter (Dropdown-Mehrfachauswahl) ----
function buildFilters(){
  const datumItems=[...new Set(rows.map(r=>r.rechnungsdatum).filter(Boolean))]
    .sort((a,b)=>new Date(a)-new Date(b)).map(d=>({key:d,label:fmtDate(d)}));
  ddDatum=multiselect('ddDatum','Datum', datumItems, fDatum, true);

  const lieferanten=[...new Set(rows.map(r=>r.lieferant||'—'))].sort((a,b)=>a.localeCompare(b,'de'));
  ddLief=multiselect('ddLieferant','Lieferant', lieferanten.map(v=>({key:v,label:v})), fLieferant, true);

  const treiber=[...new Set(rows.map(r=>r.kostentreiber||'—'))].sort((a,b)=>a.localeCompare(b,'de'));
  ddTre=multiselect('ddKostentreiber','Kostentreiber', treiber.map(v=>({key:v,label:v})), fTreiber, false);

  // Betragsfilter (Eingabe)
  const amt={bMin:v=>bMin=v,bMax:v=>bMax=v,nMin:v=>nMin=v,nMax:v=>nMax=v};
  Object.keys(amt).forEach(id=>{
    document.getElementById(id).addEventListener('input',e=>{ amt[id](num(e.target.value)); afterFilterChange(); });
  });

  document.getElementById('clearBtn').onclick=resetFilters;
}
function multiselect(elId,label,items,stateSet,withSearch){
  const root=document.getElementById(elId);
  root.innerHTML=
    `<button class="ddbtn" type="button">${label} <span class="badge"></span><span>▾</span></button>
     <div class="ddmenu">${withSearch?'<input class="ddsearch" placeholder="Suchen…">':''}<div class="ddlist"></div></div>`;
  const btn=root.querySelector('.ddbtn'), list=root.querySelector('.ddlist'),
        badge=root.querySelector('.badge'), sinput=root.querySelector('.ddsearch');
  function paintList(q){
    const f=(q||'').toLowerCase();
    list.innerHTML='';
    items.filter(it=>it.label.toLowerCase().includes(f)).forEach(it=>{
      const row=document.createElement('label'); row.className='ddrow';
      row.innerHTML=`<input type="checkbox" ${stateSet.has(it.key)?'checked':''}><span>${it.label}</span>`;
      row.querySelector('input').onchange=ev=>{
        if(ev.target.checked) stateSet.add(it.key); else stateSet.delete(it.key);
        paintBadge(); afterFilterChange();
      };
      list.appendChild(row);
    });
  }
  function paintBadge(){ badge.textContent=stateSet.size||''; badge.style.display=stateSet.size?'inline-block':'none'; }
  btn.onclick=e=>{ e.stopPropagation(); root.classList.toggle('open'); };
  if(sinput) sinput.oninput=e=>paintList(e.target.value);
  paintList(''); paintBadge();
  return { refresh(){ paintList(sinput?sinput.value:''); paintBadge(); } };
}
function resetFilters(){
  fDatum.clear(); fLieferant.clear(); fTreiber.clear(); fMonat.clear();
  bMin=bMax=nMin=nMax=null;
  ['bMin','bMax','nMin','nMax'].forEach(id=>document.getElementById(id).value='');
  ddDatum&&ddDatum.refresh(); ddLief&&ddLief.refresh(); ddTre&&ddTre.refresh();
  afterFilterChange();
}
function afterFilterChange(){
  updateTreiberColors(); updateMonatColors(); renderTable();
}

// ---- Tabelle ----
function currentRows(){
  return rows.filter(r=>{
    if(fDatum.size && !fDatum.has(r.rechnungsdatum)) return false;
    if(fLieferant.size && !fLieferant.has(r.lieferant||'—')) return false;
    if(fTreiber.size && !fTreiber.has(r.kostentreiber||'—')) return false;
    if(fMonat.size && !fMonat.has(String(monthIdx(r)))) return false;
    const b=+r.brutto||0, n=+r.netto||0;
    if(bMin!=null && b<bMin) return false;
    if(bMax!=null && b>bMax) return false;
    if(nMin!=null && n<nMin) return false;
    if(nMax!=null && n>nMax) return false;
    return true;
  });
}
function renderTable(){
  const data=currentRows().sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==='brutto'||sortKey==='netto'){x=+x||0;y=+y||0;}
    else {x=(x??'').toString();y=(y??'').toString();}
    return (x<y?-1:x>y?1:0)*(sortAsc?1:-1);
  });
  document.querySelector('#tbl tbody').innerHTML = data.map(r=>`
    <tr>
      <td>${fmtDate(r.rechnungsdatum)}</td>
      <td>${r.lieferant||''}</td>
      <td>${r.kostentreiber||''}</td>
      <td class="num">${eur(+r.brutto)}</td>
      <td class="num">${eur(+r.netto)}</td>
    </tr>`).join('');
  const sumB=data.reduce((s,r)=>s+(+r.brutto||0),0);
  const sumN=data.reduce((s,r)=>s+(+r.netto||0),0);
  document.getElementById('summary').innerHTML =
    `<b>${data.length}</b> Rechnungen angezeigt · Brutto <b>${eur(sumB)}</b> · Netto <b>${eur(sumN)}</b>`;
}

document.querySelectorAll('#tbl th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(sortKey===k) sortAsc=!sortAsc; else {sortKey=k;sortAsc=true;}
  renderTable();
}));
document.addEventListener('click',e=>{
  document.querySelectorAll('.dd.open').forEach(d=>{ if(!d.contains(e.target)) d.classList.remove('open'); });
});

load();
</script>
</body>
</html>
